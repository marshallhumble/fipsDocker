name: CI Build & Security Scan

on:
  pull_request:
    paths:
      - '**/Dockerfile'
      - '**.py'
      - '**/requirements.txt'
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  build-and-scan:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5730da4a303f5991a81c53b4a8cbadf7c4c58b4 # v3.10.0

      - name: Build Docker image
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --build-arg TARGETARCH=amd64 \
            --load \
            -t fips-python:${{ github.sha }} .

      - name: Generate SBOM (SPDX)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: fips-python:${{ github.sha }}
          format: spdx-json
          output: sbom.spdx.json

      - name: Scan for CVEs
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: fips-python:${{ github.sha }}
          severity: CRITICAL,HIGH
          exit-code: '0'
          format: table
          output: vulnscan.txt

      - name: Capture scan summary
        id: scan
        run: |
          echo "summary<<EOF" >> $GITHUB_OUTPUT
          head -n 20 vulnscan.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: sbom-${{ github.sha }}
          path: sbom.spdx.json

      - name: Post results as PR comment
        uses: marocchino/sticky-pull-request-comment@52423e01640425a022ef5fd2763bd70db72af895 # v2.9.1
        with:
          header: fips-image-security
          message: |
            ### FIPS Python Image Security Summary
            **Image Tag:** `fips-python:${{ github.sha }}`

            **Top CVEs Detected:**
  ```
  ${{ steps.scan.outputs.summary || 'No critical/high vulnerabilities found.' }}
  ```

SBOM uploaded as artifact: [Run ${{ github.run_id }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})